gatilhos:
  - id: "headcount_grande_clt"
    descricao: "Empresa com 80+ funcionários CLT (cabe folha BTG)"
    keywords:
      - "funcionários"
      - "colaboradores"
      - "team members"
      - "headcount"
      - "growing team"
      - "contratação"
      - "novas vagas"
    fontes_deteccao: ["website", "linkedin_post", "linkedin_perfil"]
    peso: 0.25

  - id: "contratacao_recente_volume"
    descricao: "Empresa em onda de contratação (crescimento de quadro nos últimos 6 meses)"
    keywords:
      - "estamos contratando"
      - "we're hiring"
      - "vagas abertas"
      - "open positions"
      - "novas vagas"
      - "expansão de equipe"
      - "growing team"
    fontes_deteccao: ["linkedin_post", "website"]
    peso: 0.20

  - id: "preocupacao_retencao_beneficios"
    descricao: "Empresa demonstra preocupação com retenção, turnover ou benefícios"
    keywords:
      - "retenção"
      - "turnover"
      - "benefícios"
      - "people experience"
      - "employee benefits"
      - "engajamento"
      - "cultura organizacional"
      - "valorização do colaborador"
    fontes_deteccao: ["linkedin_post", "website"]
    peso: 0.20

  - id: "expansao_filiais_unidades"
    descricao: "Empresa em expansão de unidades operacionais (rede de varejo, franquias, filiais)"
    keywords:
      - "nova filial"
      - "novas unidades"
      - "expansão"
      - "new branch"
      - "franquia"
      - "nova loja"
      - "abertura de"
    fontes_deteccao: ["noticia", "linkedin_post"]
    peso: 0.20

  - id: "contratacao_executivo_rh"
    descricao: "Empresa contratou Diretor de RH, CHRO ou Head of People novo"
    keywords:
      - "Diretor de RH"
      - "CHRO"
      - "Head of People"
      - "People Director"
      - "VP of HR"
      - "Diretor de Pessoas"
    fontes_deteccao: ["linkedin_post", "linkedin_perfil"]
    peso: 0.15

sub_personas:
  - id: "industria_folha_grande"
    descricao: "Indústria com folha numerosa e perfil de funcionário com necessidade de consignado"
    indicadores_cnae: ["1011", "1091", "1411", "2511", "2814", "2911", "4120", "4211"]
    foco_produto: "consignado privado BTG + integração com folha"

  - id: "saude_educacao"
    descricao: "Hospital, clínica, faculdade ou escola com folha grande e estabilidade"
    indicadores_cnae: ["8511", "8512", "8513", "8520", "8531", "8532", "8533", "8610", "8630", "8650"]
    foco_produto: "domicílio bancário + benefícios para profissionais qualificados"

  - id: "varejo_servicos_rede"
    descricao: "Rede de varejo, restaurantes ou serviços com muitos funcionários distribuídos"
    indicadores_cnae: ["4711", "5510", "5611", "4520"]
    foco_produto: "folha multi-unidade com gestão centralizada"

  - id: "bpo_terceirizado"
    descricao: "Empresa BPO/terceirização com folha alta e turnover elevado"
    indicadores_cnae: ["8011", "8121", "8211", "8220", "8222", "8230", "8299"]
    foco_produto: "consignado como benefício de retenção"

criterios_desqualificadores:
  - tipo: "faturamento_abaixo_minimo"
    razao: "BTG não opera folha abaixo de R$ 5M"

  - tipo: "headcount_abaixo_minimo"
    razao: "BTG exige mínimo de 80 funcionários CLT para folha"

  - tipo: "setor_excluido"
    cnaes: ["8411", "8413", "8414", "8421", "8422", "8423", "8424", "8425", "8430"]
    razao: "Setor público tem regras próprias de folha"

