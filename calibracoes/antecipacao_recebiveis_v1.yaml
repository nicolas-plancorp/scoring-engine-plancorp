  - id: "produtor_rural"
    descricao: "Produtor rural com CPR ou contrato de venda futura"
    indicadores_cnae: ["0111", "0112", "0113", "0114", "0115", "0121", "0131", "0210"]
    foco_produto: "modalidade Agro SB Crédito, antecipação de CPR"

  - id: "prestador_grandes_contas"
