gatilhos:
  - id: "crescimento_receita_acelerado"
    descricao: "Empresa em crescimento de receita relevante (>20% YoY) — pressão de capital de giro"
    keywords:
      - "crescimento"
      - "expansão"
      - "aumento de receita"
      - "growth"
      - "faturamento cresceu"
      - "expandindo operação"
      - "abrindo loja"
      - "novo mercado"
    fontes_deteccao: ["website", "linkedin_post", "noticia"]
    peso: 0.25

  - id: "prazo_recebimento_longo"
    descricao: "Empresa vende B2B com prazo de recebimento longo (60-120 dias)"
    keywords:
      - "prazo de pagamento"
      - "B2B"
      - "venda corporativa"
      - "duplicata"
      - "boleto a prazo"
      - "carteira de recebíveis"
      - "60 dias"
      - "90 dias"
    fontes_deteccao: ["website", "linkedin_post"]
    peso: 0.25

  - id: "cliente_grande_porte"
    descricao: "Empresa vende para grandes clientes (empresas âncora, varejistas, governo) com prazos longos"
    keywords:
      - "cliente âncora"
      - "grandes empresas"
      - "varejo nacional"
      - "Magazine Luiza"
      - "Mercado Livre"
      - "Carrefour"
      - "Casas Bahia"
      - "rede nacional"
      - "fornecedor de governo"
    fontes_deteccao: ["website", "linkedin_post", "noticia"]
    peso: 0.20

  - id: "captacao_recente_capital"
    descricao: "Empresa captou capital recentemente ou está em rodada de funding"
    keywords:
      - "captação"
      - "rodada de investimento"
      - "Series A"
      - "Series B"
      - "investimento de"
      - "aporte de"
      - "raised"
      - "funding round"
    fontes_deteccao: ["noticia", "linkedin_post"]
    peso: 0.15

  - id: "pressao_fluxo_caixa"
    descricao: "Decisor menciona pressão de fluxo de caixa, descasamento ou necessidade de capital"
    keywords:
      - "fluxo de caixa"
      - "descasamento"
      - "capital de giro"
      - "working capital"
      - "cash flow"
      - "necessidade de capital"
    fontes_deteccao: ["linkedin_post", "linkedin_perfil"]
    peso: 0.15

sub_personas:
  - id: "distribuidor_b2b"
    descricao: "Distribuidor atacadista vendendo para varejo grande com prazo de 60-90 dias"
    indicadores_cnae: ["4611", "4632", "4635", "4639", "4644", "4646", "4647", "4649", "4661", "4662", "4672", "4673", "4679", "4684", "4685"]
