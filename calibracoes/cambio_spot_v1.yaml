# ═══════════════════════════════════════════════════════
# GATILHOS DE COMPRA (compõem 50 pts do score)
# Pesos somam 1.0 — cada gatilho contribui peso × confidence × 50
# ═══════════════════════════════════════════════════════

gatilhos:
  - id: "pagamento_recorrente_fornecedor_exterior"
    descricao: "Empresa menciona pagamentos recorrentes a fornecedores internacionais (importação contínua)"
    keywords:
      - "fornecedor exterior"
      - "fornecedor internacional"
      - "importação"
      - "import"
      - "pagamento internacional"
      - "remessa internacional"
      - "TED internacional"
      - "wire transfer"
    fontes_deteccao: ["website", "linkedin_post", "noticia"]
    peso: 0.25

  - id: "recebimento_moeda_estrangeira"
    descricao: "Empresa recebe receita em moeda estrangeira (clientes/contratos internacionais)"
    keywords:
      - "receita USD"
      - "receita em dólar"
      - "clientes no exterior"
      - "export"
      - "exportação"
      - "international clients"
      - "global clients"
      - "receita internacional"
    fontes_deteccao: ["website", "linkedin_post", "linkedin_perfil"]
    peso: 0.25

  - id: "expansao_internacional"
    descricao: "Empresa anuncia abertura de operação, escritório ou subsidiária no exterior"
    keywords:
      - "expansão internacional"
      - "abertura de escritório"
      - "subsidiária no exterior"
      - "international expansion"
      - "novo mercado"
      - "matriz no exterior"
      - "global expansion"
    fontes_deteccao: ["noticia", "linkedin_post"]
    peso: 0.20

  - id: "insatisfacao_banco_cambio"
    descricao: "Decisor ou empresa demonstra insatisfação com banco/spread atual de câmbio"
