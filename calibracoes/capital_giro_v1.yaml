      - "investimento em maquinário"
      - "compra de equipamento"
      - "nova máquina"
      - "modernização da planta"
      - "novo galpão"
      - "capex"
      - "investment plan"
    fontes_deteccao: ["linkedin_post", "noticia"]
    peso: 0.20

  - id: "crescimento_estoque"
    descricao: "Empresa precisa de capital para giro de estoque ou aumento de pedidos"
