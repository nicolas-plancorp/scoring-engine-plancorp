      - "demanda crescente"
      - "estoque maior"
      - "compra antecipada"
      - "inventory increase"
      - "stock up"
    fontes_deteccao: ["linkedin_post", "website"]
    peso: 0.20

  - id: "renegociacao_divida"
    descricao: "Decisor menciona necessidade de renegociar dívida ou substituir crédito caro"
