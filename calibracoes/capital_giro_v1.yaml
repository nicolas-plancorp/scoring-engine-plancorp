      - "renegociar"
      - "trocar de banco"
      - "taxa abusiva"
      - "spread alto"
      - "consolidar dívida"
      - "refinance"
      - "debt restructuring"
    fontes_deteccao: ["linkedin_post"]
    peso: 0.15

