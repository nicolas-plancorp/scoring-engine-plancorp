    peso: 0.25

  - id: "sazonalidade_demanda"
    descricao: "Empresa tem sazonalidade clara (estoque para Black Friday, safra, alta temporada)"
    keywords:
      - "Black Friday"
      - "Natal"
      - "safra"
      - "alta temporada"
      - "seasonality"
      - "pico de vendas"
      - "estoque para"
    fontes_deteccao: ["website", "linkedin_post"]
    peso: 0.20

  - id: "investimento_ativo_imobilizado"
    descricao: "Empresa investiu ou planeja investir em maquinário, equipamentos ou imóveis"
